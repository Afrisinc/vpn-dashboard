name: Deploy Production

on:
  push:
    branches:
      - main # deploy on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_GHCR_USERNAME: ${{ secrets.DEPLOY_GHCR_USERNAME }}
      DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Login to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_OWNER }} # org name, e.g., afrisinc
          password: ${{ secrets.GHCR_TOKEN }} # your PAT

      # Step 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_OWNER }}/vpn-dashboard:production .

      # Step 4: Push Docker image to GHCR
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_OWNER }}/vpn-dashboard:production

      # Step 5: SSH deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m

          # 🔐 PASS DEPLOY CREDS TO VPS
          envs: DEPLOY_GHCR_USERNAME,DEPLOY_GHCR_TOKEN
          script: |
            set -e
            APP_PATH="${{ secrets.VPS_APP_PATH }}/vpn-dashboard/prod"
            cd $APP_PATH

            echo "$DEPLOY_GHCR_TOKEN" | docker login ghcr.io -u "$DEPLOY_GHCR_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d 
            docker image prune -af
